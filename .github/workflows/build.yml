name: LumaBurn Pipeline

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    name: Code Quality (Lint & Format)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
      - run: npm install
      - name: Lint Check
        run: npm run lint
      - name: Format Check
        run: npm run format:check

  test-and-build:
    name: Test & Build Matrix
    needs: quality
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
      - run: npm install
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium
      - name: Run Tests with Coverage Enforcement
        run: npm test

      - name: Build Electron App (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: npx electron-builder --linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Electron App (MacOS)
        if: matrix.os == 'macos-latest'
        run: npx electron-builder --mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Electron App (Windows)
        if: matrix.os == 'windows-latest'
        run: npx electron-builder --win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Linux -- AppImage (x86_64)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v7
        with:
          path: dist/*x86_64.AppImage
          archive: false

      - name: Upload Linux -- AppImage (arm64)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v7
        with:
          path: dist/*arm64.AppImage
          archive: false

      - name: Upload Linux -- DEB (amd64)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v7
        with:
          path: dist/*amd64.deb
          archive: false

      - name: Upload Linux -- DEB (arm64)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v7
        with:
          path: dist/*arm64.deb
          archive: false

      - name: Upload Linux -- RPM (x86_64)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v7
        with:
          path: dist/*.x86_64.rpm
          archive: false

      - name: Upload Linux -- RPM (aarch64)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v7
        with:
          path: dist/*.aarch64.rpm
          archive: false

      - name: Upload MacOS -- DMG
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v7
        with:
          path: dist/*.dmg
          archive: false

      - name: Upload Windows -- EXE
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v7
        with:
          path: dist/*.exe
          archive: false
