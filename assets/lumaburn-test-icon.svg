<svg xmlns="http://www.w3.org/2000/svg" width="120mm" height="120mm" viewBox="0 0 1000 1000">
  <title>LumaBurn Test Icon</title>
  <desc>Simple burn-and-cut badge derived from the LumaBurn app icon. Red stroke is the cut outline.</desc>

  <g id="cut" fill="none" stroke="#ff0000" stroke-width="10" stroke-linejoin="round">
    <rect x="120" y="120" width="760" height="760" rx="120" ry="120" />
  </g>

  <g id="engrave" fill="none" stroke="#000000" stroke-linecap="round" stroke-linejoin="round">
    <rect x="150" y="150" width="700" height="700" rx="94" ry="94" stroke-width="10" opacity="0.32" />

    <g id="beam" stroke-width="16">
      <line x1="500" y1="150" x2="500" y2="470" />
      <line x1="476" y1="150" x2="486" y2="456" opacity="0.35" />
      <line x1="524" y1="150" x2="514" y2="456" opacity="0.35" />
    </g>

    <g id="bed" stroke-width="8" opacity="0.68">
      <polygon points="500,265 790,455 500,645 210,455" />

      <line x1="282" y1="408" x2="500" y2="551" opacity="0.3" />
      <line x1="354" y1="361" x2="572" y2="504" opacity="0.3" />
      <line x1="426" y1="314" x2="644" y2="457" opacity="0.3" />

      <line x1="574" y1="314" x2="356" y2="457" opacity="0.24" />
      <line x1="646" y1="361" x2="428" y2="504" opacity="0.24" />
      <line x1="718" y1="408" x2="500" y2="551" opacity="0.24" />
    </g>

    <g id="flare" stroke-width="9">
      <circle cx="500" cy="470" r="16" />
      <line x1="466" y1="470" x2="534" y2="470" />
      <line x1="500" y1="436" x2="500" y2="504" />
      <line x1="476" y1="446" x2="524" y2="494" opacity="0.42" />
      <line x1="476" y1="494" x2="524" y2="446" opacity="0.42" />
    </g>

    <g id="cut-line" stroke-width="13">
      <line x1="500" y1="470" x2="610" y2="540" />
      <line x1="500" y1="470" x2="648" y2="494" opacity="0.38" />
    </g>

    <g id="sparks" stroke-width="7">
      <line x1="500" y1="470" x2="626" y2="438" />
      <line x1="500" y1="470" x2="674" y2="424" opacity="0.45" />
      <line x1="500" y1="470" x2="712" y2="400" opacity="0.32" />
      <line x1="500" y1="470" x2="640" y2="470" opacity="0.4" />
      <line x1="500" y1="470" x2="684" y2="486" opacity="0.42" />
      <line x1="500" y1="470" x2="706" y2="520" opacity="0.34" />
    </g>

    <g id="wordmark" fill="#000000" stroke="none">
      <text x="500" y="785" text-anchor="middle" font-size="72" font-family="Arial, sans-serif" font-weight="700" letter-spacing="3">LumaBurn</text>
    </g>
  </g>
</svg>
