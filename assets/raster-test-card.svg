<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" viewBox="0 0 1200 1200">
  <title>LumaBurn Raster Test Card</title>
  <desc>
    Open raster benchmark card for evaluating grayscale ramps, fine-line fidelity, text legibility,
    dot fill uniformity, photo-like tonal rendering, and circular detail on laser raster workflows.
  </desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5f1ea"/>
      <stop offset="100%" stop-color="#ddd3c2"/>
    </linearGradient>
    <linearGradient id="gray-ramp" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#000"/>
      <stop offset="100%" stop-color="#fff"/>
    </linearGradient>
    <pattern id="dot-grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="2.8" fill="#444"/>
    </pattern>
    <clipPath id="portrait-clip">
      <rect x="710" y="150" width="340" height="420" rx="28"/>
    </clipPath>
  </defs>

  <rect width="1200" height="1200" fill="url(#bg)"/>
  <rect x="48" y="48" width="1104" height="1104" rx="38" fill="#faf7f0" stroke="#111" stroke-width="6"/>

  <text x="88" y="120" font-family="Georgia, 'Times New Roman', serif" font-size="54" fill="#111">
    LumaBurn Raster Test Card
  </text>
  <text x="90" y="168" font-family="'Courier New', monospace" font-size="24" fill="#333">
    Gradients · Fine lines · Text · Dot fill · Photo-like tones
  </text>

  <g transform="translate(90 220)">
    <text x="0" y="-22" font-family="'Courier New', monospace" font-size="22" fill="#111">1. Grayscale Ramp</text>
    <rect x="0" y="0" width="560" height="70" fill="url(#gray-ramp)" stroke="#111" stroke-width="2"/>
    <g font-family="'Courier New', monospace" font-size="18" fill="#111">
      <text x="0" y="102">0%</text>
      <text x="264" y="102">50%</text>
      <text x="522" y="102">100%</text>
    </g>
  </g>

  <g transform="translate(90 380)">
    <text x="0" y="-22" font-family="'Courier New', monospace" font-size="22" fill="#111">2. Fine Line Sweep</text>
    <rect x="0" y="0" width="560" height="200" fill="#fff" stroke="#111" stroke-width="2"/>
    <g fill="#111">
      <rect x="18" y="24" width="2" height="150"/>
      <rect x="32" y="24" width="2" height="150"/>
      <rect x="48" y="24" width="3" height="150"/>
      <rect x="68" y="24" width="4" height="150"/>
      <rect x="94" y="24" width="5" height="150"/>
      <rect x="126" y="24" width="6" height="150"/>
      <rect x="164" y="24" width="8" height="150"/>
      <rect x="212" y="24" width="10" height="150"/>
      <rect x="272" y="24" width="12" height="150"/>
      <rect x="344" y="24" width="14" height="150"/>
      <rect x="430" y="24" width="18" height="150"/>
      <rect x="530" y="24" width="22" height="150"/>
    </g>
    <g font-family="'Courier New', monospace" font-size="16" fill="#111">
      <text x="12" y="192">0.05</text>
      <text x="44" y="192">0.1</text>
      <text x="91" y="192">0.15</text>
      <text x="159" y="192">0.2</text>
      <text x="268" y="192">0.3</text>
      <text x="427" y="192">0.45</text>
      <text x="515" y="192">0.6 mm</text>
    </g>
  </g>

  <g transform="translate(90 650)">
    <text x="0" y="-22" font-family="'Courier New', monospace" font-size="22" fill="#111">3. Text Legibility</text>
    <rect x="0" y="0" width="560" height="220" fill="#fff" stroke="#111" stroke-width="2"/>
    <text x="24" y="52" font-family="Georgia, serif" font-size="40" fill="#111">Serif sample: LumaBurn Raster</text>
    <text x="24" y="102" font-family="Arial, Helvetica, sans-serif" font-size="28" fill="#111">Sans sample: LumaBurn 0O8B5S 123456789</text>
    <text x="24" y="145" font-family="'Courier New', monospace" font-size="22" fill="#111">Mono sample: LumaBurn MMWwii11__--..</text>
    <rect x="24" y="164" width="330" height="30" fill="#111"/>
    <text x="36" y="186" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#fff">Inverse sample: LumaBurn</text>
    <text x="24" y="185" font-family="'Courier New', monospace" font-size="16" fill="#111">
      Small type: watch counters, joins, blur, overscan, and dither breakup.
    </text>
  </g>

  <g transform="translate(710 220)">
    <text x="0" y="-22" font-family="'Courier New', monospace" font-size="22" fill="#111">4. Dot Fill + Checkers</text>
    <rect x="0" y="0" width="340" height="220" fill="#fff" stroke="#111" stroke-width="2"/>
    <rect x="22" y="24" width="134" height="134" fill="url(#dot-grid)" stroke="#111" stroke-width="1.5"/>
    <g transform="translate(186 24)">
      <rect width="134" height="134" fill="#fff" stroke="#111" stroke-width="1.5"/>
      <g fill="#111">
        <rect x="0" y="0" width="33.5" height="33.5"/>
        <rect x="67" y="0" width="33.5" height="33.5"/>
        <rect x="33.5" y="33.5" width="33.5" height="33.5"/>
        <rect x="100.5" y="33.5" width="33.5" height="33.5"/>
        <rect x="0" y="67" width="33.5" height="33.5"/>
        <rect x="67" y="67" width="33.5" height="33.5"/>
        <rect x="33.5" y="100.5" width="33.5" height="33.5"/>
        <rect x="100.5" y="100.5" width="33.5" height="33.5"/>
      </g>
    </g>
    <text x="24" y="192" font-family="'Courier New', monospace" font-size="16" fill="#111">
      Checks fill uniformity and tonal breakup.
    </text>
  </g>

  <g transform="translate(710 510)">
    <text x="0" y="-22" font-family="'Courier New', monospace" font-size="22" fill="#111">5. Photo-like Tone Area</text>
    <rect x="0" y="0" width="340" height="420" rx="28" fill="#fff" stroke="#111" stroke-width="2"/>
    <g clip-path="url(#portrait-clip)">
      <rect x="710" y="150" width="340" height="420" fill="#ece4d7"/>
      <circle cx="870" cy="315" r="102" fill="#8e7a61"/>
      <ellipse cx="872" cy="345" rx="84" ry="110" fill="#cbb79d"/>
      <ellipse cx="835" cy="325" rx="14" ry="10" fill="#222"/>
      <ellipse cx="910" cy="325" rx="14" ry="10" fill="#222"/>
      <path d="M836 394 Q872 414 910 394" fill="none" stroke="#6a5642" stroke-width="8" stroke-linecap="round"/>
      <path d="M790 275 Q870 180 950 275" fill="#5f4a39"/>
      <rect x="770" y="455" width="200" height="110" rx="26" fill="#6f604f"/>
      <circle cx="770" cy="220" r="82" fill="none" stroke="#d7c6af" stroke-width="20"/>
      <text x="870" y="528" text-anchor="middle" font-family="'Courier New', monospace" font-size="28" fill="#f4ebde">
        LumaBurn
      </text>
    </g>
  </g>

  <g transform="translate(90 960)">
    <text x="0" y="0" font-family="'Courier New', monospace" font-size="22" fill="#111">6. Circular Detail</text>
    <g transform="translate(0 30)">
      <rect x="0" y="0" width="240" height="150" fill="#fff" stroke="#111" stroke-width="2"/>
      <g transform="translate(120 75)" stroke="#111" fill="none">
        <circle r="54" stroke-width="2"/>
        <circle r="34" stroke-width="2"/>
        <g stroke-width="3">
          <line x1="-60" y1="0" x2="60" y2="0"/>
          <line x1="0" y1="-60" x2="0" y2="60"/>
          <line x1="-44" y1="-44" x2="44" y2="44"/>
          <line x1="-44" y1="44" x2="44" y2="-44"/>
        </g>
      </g>
    </g>
  </g>

  <text x="90" y="1110" font-family="'Courier New', monospace" font-size="18" fill="#333">
    Best use: raster this at multiple speeds/powers and compare edge sharpness, gradient smoothness, text readability, and fill consistency.
  </text>
  <text x="90" y="1140" font-family="'Courier New', monospace" font-size="18" fill="#333">
    Reusable benchmark: includes positive/inverse text, tonal ramps, geometric detail, and photo-like content.
  </text>
</svg>
